<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RTF Student Jobs{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">RTF JOBS</a>
            
            <div class="ms-auto d-flex align-items-center gap-3">
                {% block language_switcher %}{% endblock %}

                <div class="vr text-white opacity-50 d-none d-md-block" style="height: 35px;"></div>

                <div class="d-flex gap-2" id="auth-container">
                    <button class="btn btn-link text-light btn-sm text-decoration-none" id="nav-login" data-bs-toggle="modal" data-bs-target="#loginModal">Log In</button>
                    <button class="btn btn-primary btn-sm px-3 shadow-sm" id="nav-register" data-bs-toggle="modal" data-bs-target="#registerModal">Sign Up</button>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="py-4 bg-white border-top shadow-sm mt-auto">
        <div class="container text-center text-muted">
            <p class="mb-0">© 2026 <strong>RTF Student Jobs</strong></p>
        </div>
    </footer>

    {% include "modals.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
