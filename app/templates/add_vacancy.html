{% extends "base.html" %}

{% block title %}Post a New Vacancy - RTF Jobs{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0 p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">🚀 Post a New Vacancy</h2>
                    <p class="text-muted">Write in any language — we will translate it automatically!</p>
                </div>

                <form id="add-vacancy-form">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Job Title</label>
                        <input type="text" id="v-title" class="form-control form-control-lg" 
                               placeholder="e.g. Senior Python Developer" required>
                        <div class="form-text">Example: Frontend Engineer, Data Scientist...</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Description</label>
                        <textarea id="v-desc" class="form-control" rows="6" 
                                  placeholder="Describe responsibilities, requirements, and benefits..." required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Department</label>
                        <select id="v-dept" class="form-select">
                            <option value="1" selected>IT & Software Development</option>
                            <option value="2">Design & Creative</option>
                            <option value="3">Infrastructure & DevOps</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2 mt-5">
                        <button type="submit" id="submit-btn" class="btn btn-primary btn-lg shadow-sm">
                            <span id="btn-text">Publish Vacancy</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                        <a href="/" class="btn btn-link text-decoration-none text-muted">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Проверка прав доступа (Security Check)
    const userData = JSON.parse(localStorage.getItem('user'));
    
    if (!userData || userData.role !== 'organization') {
        alert('Access denied. Only organizations can post vacancies.');
        window.location.href = '/';
        return;
    }

    const form = document.getElementById('add-vacancy-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    // 2. Обработка отправки формы
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Анимация загрузки (так как перевод на бэкенде займет 1-2 сек)
        submitBtn.disabled = true;
        btnText.innerText = 'Translating & Saving...';
        btnSpinner.classList.remove('d-none');

        const vacancyData = {
            title: document.getElementById('v-title').value,
            description: document.getElementById('v-desc').value,
            department_id: document.getElementById('v-dept').value,
            company: userData.name // Берем название компании из профиля
        };

        try {
            const response = await fetch('/api/vacancies', { // Путь соответствует твоему Blueprint
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(vacancyData)
            });

            if (response.ok) {
                const result = await response.json();
                alert('Success! Vacancy posted and localized.');
                window.location.href = '/'; // Редирект на главную
            } else {
                const error = await response.json();
                alert('Error: ' + (error.message || 'Something went wrong'));
            }
        } catch (err) {
            console.error('Fetch error:', err);
            alert('Server connection error.');
        } finally {
            // Возвращаем кнопку в исходное состояние
            submitBtn.disabled = false;
            btnText.innerText = 'Publish Vacancy';
            btnSpinner.classList.add('d-none');
        }
    });
});
</script>
{% endblock %}
