<div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Create Account</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3"><label class="form-label text-muted small">Full Name</label><input type="text" id="reg-name" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label text-muted small">Email</label><input type="email" id="reg-email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label text-muted small">Password</label><input type="password" id="reg-password" class="form-control" required></div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">Role</label>
                        <select id="reg-role" class="form-select" required>
                            <option value="student">Student</option>
                            <option value="organization">Organization</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 shadow-sm py-2">Sign Up</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content shadow border-0">
            <div class="modal-header bg-primary text-white text-center">
                <h5 class="modal-title w-100 fw-bold">Log In</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="loginForm">
                    <div class="mb-3"><input type="email" id="login-email" class="form-control" placeholder="Email" required></div>
                    <div class="mb-3"><input type="password" id="login-password" class="form-control" placeholder="Password" required></div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
