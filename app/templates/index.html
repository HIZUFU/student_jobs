<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTF Student Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { transition: transform 0.2s; border: none; }
        .card:hover { transform: translateY(-5px); }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        #vacancy-list { min-height: 200px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-5 ">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">RTF JOBS</a>

        <div class="ms-auto d-flex align-items-center gap-3">
            
            <div class="btn-group" role="group">
                <button id="btn-en" class="btn btn-outline-light btn-sm px-3 active" onclick="loadVacancies('en')">EN</button>
                <button id="btn-de" class="btn btn-outline-light btn-sm px-3" onclick="loadVacancies('de')">DE</button>
            </div>

            <div class="vr text-white opacity-50" style="height: 35px;"></div>

            <div class="d-flex gap-2">
                <button class="btn btn-link text-light btn-sm text-decoration-none" id="nav-login" data-bs-toggle="modal" data-bs-target="#loginModal">
                    Log In
                </button>
                <button class="btn btn-primary btn-sm px-3 shadow-sm" id="nav-register" data-bs-toggle="modal" data-bs-target="#registerModal">
                    Sign Up
                </button>
            </div>
        </div>
    </div>
</nav>

    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold" id="main-title">Available Vacancies</h1>
            <p class="text-muted" id="sub-title">Find your dream internship or part-time job</p>
        </div>
        
        <div class="row g-4" id="vacancy-list">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 mt-5 bg-white border-top">
        <div class="container text-center">
            <p class="text-muted mb-0">© 2026 RTF Student Project
    </footer>

    <script>
        const translations = {
            en: {
                title: "Available Vacancies",
                subtitle: "Find your dream internship or part-time job",
                apply: "Details & Apply",
                noVacancies: "No vacancies found at the moment.",
                loading: "Loading..."
            },
            de: {
                title: "Verfügbare Stellen",
                subtitle: "Finden Sie Ihr Traum-Praktikum oder Nebenjob",
                apply: "Details & Bewerben",
                noVacancies: "Aktuell keine Stellen найдены.",
                loading: "Laden..."
            }
        };

        async function loadVacancies(lang = 'en') {
            const list = document.getElementById('vacancy-list');
            const mainTitle = document.getElementById('main-title');
            const subTitle = document.getElementById('sub-title');
            
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-de').classList.toggle('active', lang === 'de');

            mainTitle.innerText = translations[lang].title;
            subTitle.innerText = translations[lang].subtitle;

            try {
                const response = await fetch(`/api/vacancies?lang=${lang}`);
                const vacancies = await response.json();
                
                if (vacancies.length === 0) {
                    list.innerHTML = `<div class="col-12 text-center py-5"><h3>${translations[lang].noVacancies}</h3></div>`;
                    return;
                }

                list.innerHTML = vacancies.map(v => `
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body d-flex flex-column">
                                <div class="mb-2">
                                    <span class="badge bg-primary-subtle text-primary border border-primary-subtle">New</span>
                                </div>
                                <h5 class="card-title fw-bold">${v.title}</h5>
                                <h6 class="card-subtitle mb-3 text-secondary">${v.company}</h6>
                                <p class="card-text text-muted flex-grow-1">
                                    ${v.description ? v.description.substring(0, 100) + '...' : ''}
                                </p>
                                <button class="btn btn-primary w-100 mt-3 shadow-sm" onclick="alert('Applying for id: ${v.id}')">
                                    ${translations[lang].apply}
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                list.innerHTML = `<div class="alert alert-danger">Error connecting to server. Please check if backend is running.</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => loadVacancies('en'));
    </script>
    <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create Account</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="reg-name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="reg-email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="reg-password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select id="reg-role" class="form-select" required>
                            <option value="student">Student</option>
                            <option value="organization">Organization</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-info text-white w-100">Sign Up</button>
                </form>
            </div>
        </div>
    </div>
</div>
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white"><h5>Log In</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3"><label class="form-label">Email address</label><input type="email" id="login-email" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Password</label><input type="password" id="login-password" class="form-control" required></div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
