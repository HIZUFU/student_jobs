{% extends "base.html" %}

{% block title %}RTF Student Jobs - Home{% endblock %}

{% block language_switcher %}
<div class="btn-group" role="group">
    <button id="btn-en" class="btn btn-outline-light btn-sm px-3 active" onclick="loadVacancies('en')">EN</button>
    <button id="btn-de" class="btn btn-outline-light btn-sm px-3" onclick="loadVacancies('de')">DE</button>
</div>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold" id="main-title">Available Vacancies</h1>
        <p class="text-muted" id="sub-title">Find your dream internship or part-time job</p>
    </div>
    
    <div class="row g-4" id="vacancy-list">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const translations = {
        en: {
            title: "Available Vacancies",
            subtitle: "Find your dream internship or part-time job",
            apply: "Details & Apply",
            noVacancies: "No vacancies found at the moment.",
            loading: "Loading..."
        },
        de: {
            title: "Verfügbare Stellen",
            subtitle: "Finden Sie Ihr Traum-Praktikum oder Nebenjob",
            apply: "Details & Bewerben",
            noVacancies: "Aktuell keine Stellen gefunden.",
            loading: "Laden..."
        }
    };

    async function loadVacancies(lang = 'en') {
        const list = document.getElementById('vacancy-list');
        const mainTitle = document.getElementById('main-title');
        const subTitle = document.getElementById('sub-title');
        
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-de').classList.toggle('active', lang === 'de');

        mainTitle.innerText = translations[lang].title;
        subTitle.innerText = translations[lang].subtitle;

        try {
            const response = await fetch(`/api/vacancies?lang=${lang}`);
            const vacancies = await response.json();
            
            if (!vacancies || vacancies.length === 0) {
                list.innerHTML = `<div class="col-12 text-center py-5"><h3 class="text-muted">${translations[lang].noVacancies}</h3></div>`;
                return;
            }

            list.innerHTML = vacancies.map(v => `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body d-flex flex-column p-4">
                            <div class="mb-2">
                                <span class="badge bg-primary-subtle text-primary border border-primary-subtle">New</span>
                            </div>
                            <h5 class="card-title fw-bold text-dark">${v.title}</h5>
                            <h6 class="card-subtitle mb-3 text-secondary">${v.company}</h6>
                            <p class="card-text text-muted flex-grow-1">
                                ${v.description ? v.description.substring(0, 120) + '...' : 'No description available.'}
                            </p>
                            <button class="btn btn-primary w-100 mt-3 shadow-sm py-2" onclick="alert('Applying for vacancy: ${v.title}')">
                                ${translations[lang].apply}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            console.error("Error loading vacancies:", error);
            list.innerHTML = `
                <div class="alert alert-danger mx-auto" style="max-width: 500px;">
                    <strong>Error!</strong> Could not connect to the server. Please ensure Flask is running.
                </div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadVacancies('en');
    });
</script>
{% endblock %}
